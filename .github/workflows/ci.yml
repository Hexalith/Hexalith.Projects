name: CI

on:
  push:
    branches:
      - main
      - next
      - alpha
      - beta
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  workflow-gates:
    name: Validate workflow policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: false

      - name: Validate CI/CD invariants
        shell: pwsh
        run: ./tests/tools/run-ci-workflow-gates.ps1

  ci:
    uses: Hexalith/Hexalith.Builds/.github/workflows/domain-ci.yml@main
    with:
      solution: >-
        Hexalith.Projects.CI.slnx
        -p:HexalithCommonsRoot=${{ github.workspace }}/references/Hexalith.Commons
      dapr-version: '1.18.0'
      unit-test-projects: |
        tests/Hexalith.Projects.Contracts.Tests
        tests/Hexalith.Projects.Client.Tests
        tests/Hexalith.Projects.Tests
        tests/Hexalith.Projects.Server.Tests
        tests/Hexalith.Projects.UI.Tests
        tests/Hexalith.Projects.Mcp.Tests
        tests/Hexalith.Projects.Cli.Tests
      integration-test-projects: |
        tests/Hexalith.Projects.Integration.Tests

  project-gates:
    name: Projects generated-artifact gates
    runs-on: ubuntu-latest
    needs: ci
    env:
      CI: 'true'
      HexalithCommonsRoot: ${{ github.workspace }}/references/Hexalith.Commons
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize root-declared submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - name: Initialize .NET
        uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@main
        with:
          global-json-file: global.json

      - name: FrontComposer inspect gate
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-frontcomposer-inspect-gate.ps1

      - name: OpenAPI fingerprint / compatibility gate
        shell: pwsh
        timeout-minutes: 15
        run: ./tests/tools/run-openapi-fingerprint-gate.ps1

  package-gates:
    name: Validate release packages
    runs-on: ubuntu-latest
    needs: ci
    env:
      CI: 'true'
      HexalithCommonsRoot: ${{ github.workspace }}/references/Hexalith.Commons
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize root-declared submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - name: Initialize .NET
        uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@main
        with:
          global-json-file: global.json

      - name: Simulate and validate release packages
        shell: pwsh
        timeout-minutes: 30
        run: ./tests/tools/run-package-dependency-gate.ps1

  e2e:
    name: Scheduled Playwright E2E
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    needs:
      - ci
      - workflow-gates
      - project-gates
      - package-gates
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install locked dependencies without lifecycle scripts
        env:
          CI: '1'
        run: npm --prefix tests/e2e ci --ignore-scripts

      - name: Install Playwright browsers explicitly
        run: npm --prefix tests/e2e run install:browsers

      - name: Typecheck E2E suite
        run: npm --prefix tests/e2e run typecheck

      - name: Run E2E suite
        env:
          CI: '1'
        run: npm --prefix tests/e2e test -- --workers=1

      - name: Upload E2E failure evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-failure-evidence-${{ github.sha }}
          path: |
            tests/e2e/test-results
            tests/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Release tested main SHA
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - ci
      - workflow-gates
      - project-gates
      - package-gates
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: Hexalith/Hexalith.Builds/.github/workflows/domain-release.yml@main
    with:
      solution: >-
        Hexalith.Projects.CI.slnx
        -p:HexalithCommonsRoot=${{ github.workspace }}/references/Hexalith.Commons
      dapr-version: '1.18.0'
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
