# WARNING: Local development only.
# Production must use deny-by-default Dapr access control with mTLS, environment-specific trust
# domains, and reviewed caller policies. This file exists to make local service-invocation paths
# explicit; it is not a production security baseline.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: projects-local-accesscontrol
spec:
  accessControl:
    # Local development only: without Dapr mTLS the caller app-id cannot be verified, so per-app
    # policies never match and a deny default returns 403 to every service invocation (eventstore ->
    # domain /process) and pub/sub delivery. Allow by default for local dev; production must restore
    # deny-by-default with mTLS + reviewed caller policies.
    defaultAction: allow
    trustDomain: "public"
    policies:
      - appId: eventstore
        defaultAction: allow
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /process
            httpVerb: ["POST"]
            action: allow
          - name: process
            httpVerb: ["POST"]
            action: allow
          - name: /api/v1/commands
            httpVerb: ["POST"]
            action: allow
          - name: /api/v1/queries
            httpVerb: ["POST"]
            action: allow
          - name: /admin/operational-index-metadata
            httpVerb: ["POST"]
            action: allow
          - name: admin/operational-index-metadata
            httpVerb: ["POST"]
            action: allow
      - appId: tenants
        defaultAction: allow
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /process
            httpVerb: ["POST"]
            action: allow
          - name: process
            httpVerb: ["POST"]
            action: allow
          - name: /tenants/events
            httpVerb: ["POST"]
            action: allow
          - name: /admin/operational-index-metadata
            httpVerb: ["POST"]
            action: allow
          - name: admin/operational-index-metadata
            httpVerb: ["POST"]
            action: allow
      - appId: projects
        defaultAction: allow
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /process
            httpVerb: ["POST"]
            action: allow
          - name: /api/v1/projects
            httpVerb: ["GET", "POST"]
            action: allow
          - name: /api/v1/projects/*
            httpVerb: ["GET", "PATCH", "POST"]
            action: allow
          - name: /health
            httpVerb: ["GET"]
            action: allow
          - name: /alive
            httpVerb: ["GET"]
            action: allow
          - name: /ready
            httpVerb: ["GET"]
            action: allow
      - appId: projects-workers
        defaultAction: allow
        trustDomain: "public"
        namespace: "default"
        operations:
          - name: /tenants/events
            httpVerb: ["POST"]
            action: allow
          - name: /projects/events
            httpVerb: ["POST"]
            action: allow
          - name: /health
            httpVerb: ["GET"]
            action: allow
          - name: /alive
            httpVerb: ["GET"]
            action: allow
          - name: /ready
            httpVerb: ["GET"]
            action: allow
