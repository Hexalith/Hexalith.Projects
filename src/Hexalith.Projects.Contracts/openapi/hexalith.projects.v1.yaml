components:
  securitySchemes:
    oidcBearer:
      type: openIdConnect
      description: >
        JWT token validated through pluggable OIDC configuration. Issuer and
        audience values are pinned by deployment configuration and are not contract
        literals. Claims are transformed by EventStore before tenant authority is
        evaluated.
      openIdConnectUrl: https://oidc.invalid/.well-known/openid-configuration
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Required on mutating commands and invalid on non-mutating queries. Adapters MUST source the key from the caller and propagate it through SDK/CLI/MCP surfaces without re-encoding.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Optional caller-provided correlation identifier; adapters may generate one when absent.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    TaskId:
      name: X-Hexalith-Task-Id
      in: header
      required: false
      description: Caller-provided task identity for task-scoped operations.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    Freshness:
      name: X-Hexalith-Freshness
      in: header
      required: false
      description: Requested read-consistency or projection freshness hint for query families.
      schema:
        $ref: "#/components/schemas/ReadConsistencyClass"
    LifecycleFilter:
      name: lifecycle
      in: query
      required: false
      description: Optional lifecycle filter for list queries. Absent is equivalent to all; all returns active and archived rows visible to the caller.
      schema:
        type: string
        enum:
          - active
          - archived
          - all
    ProjectId:
      name: projectId
      in: path
      required: true
      description: Opaque tenant-scoped project identifier. It is an addressable resource reference, not tenant authority.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    ConversationId:
      name: conversationId
      in: path
      required: true
      description: Opaque Conversations-owned identifier. It is a reference identity, not tenant authority or transcript content.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
    FileReferenceId:
      name: fileReferenceId
      in: path
      required: true
      description: Opaque, Projects-owned stable file-reference identifier. It is a reference identity, not a path, tenant authority, or file content.
      schema:
        $ref: "#/components/schemas/OpaqueIdentifier"
