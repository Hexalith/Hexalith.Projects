  schemas:
    OpaqueIdentifier:
      type: string
      minLength: 16
      maxLength: 128
      pattern: "^[A-Za-z0-9][A-Za-z0-9_-]{15,127}$"
      description: Synthetic opaque identifier (ULID-shaped). It is not a path, credential, token, or tenant authority. The pattern rejects dots and colons to keep keys disjoint from cache-key tenant-prefix notation and JWT-shaped values.
      examples:
        - opaque_01HZY7Z6N7J4Q2X8Y9V0A1B2C3
    UtcDateTime:
      type: string
      format: date-time
      description: ISO-8601 UTC timestamp.
      examples:
        - "2026-05-12T12:34:56Z"
    ProblemDetails:
      type: object
      additionalProperties: true
      required:
        - type
        - title
        - status
        - category
        - code
        - message
        - correlationId
        - retryable
        - clientAction
        - details
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        category:
          $ref: "#/components/schemas/CanonicalErrorCategory"
        code:
          type: string
          pattern: "^[a-z0-9][a-z0-9_:-]{0,127}$"
        message:
          type: string
        correlationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        retryable:
          type: boolean
        clientAction:
          type: string
          enum:
            - retry
            - revise_request
            - check_credentials
            - wait_for_reconciliation
            - contact_operator
            - no_action
        details:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
          description: Metadata-only details. File contents, diffs, tokens, secrets, and unauthorized existence hints are forbidden.
    SafeAuthorizationDenial:
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
      description: Denial shape for tenant and project authorization failures. Unauthorized and nonexistent both surface as 404 so cross-tenant existence cannot be inferred.
    ValidationFailure:
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
      description: Input validation failure without echoing sensitive payload values.
    IdempotencyConflict:
      allOf:
        - $ref: "#/components/schemas/ProblemDetails"
      description: Idempotency conflict for same key and non-equivalent semantic request.
    AcceptedCommand:
      type: object
      additionalProperties: false
      required:
        - acceptedAt
        - correlationId
        - taskId
        - status
      properties:
        acceptedAt:
          $ref: "#/components/schemas/UtcDateTime"
        correlationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        taskId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        status:
          type: string
          enum:
            - accepted
        idempotentReplay:
          type: boolean
          default: false
    FreshnessMetadata:
      type: object
      additionalProperties: false
      required:
        - readConsistency
        - observedAt
        - trustState
      properties:
        readConsistency:
          $ref: "#/components/schemas/ReadConsistencyClass"
        observedAt:
          $ref: "#/components/schemas/UtcDateTime"
        projectionWatermark:
          $ref: "#/components/schemas/OpaqueIdentifier"
        stale:
          type: boolean
          default: false
        trustState:
          $ref: "#/components/schemas/ProjectionTrustState"
    ReadConsistencyClass:
      type: string
      enum:
        - snapshot_per_task
        - read_your_writes
        - eventually_consistent
    ProjectionTrustState:
      type: string
      enum:
        - trusted
        - stale
        - unavailable
      description: Deterministic trust state derived from projection evidence, never wall-clock guessing.
    SensitiveMetadataTier:
      type: string
      enum:
        - public_metadata
        - tenant_sensitive
        - credential_sensitive
        - secret
      description: Display names and other project metadata default to tenant_sensitive unless stricter tenant policy applies.
    ProjectLifecycleState:
      type: string
      description: Project lifecycle state. Mirrors the shared Hexalith.Projects.Contracts.Ui.ProjectLifecycle vocabulary (name-based wire shape); never a parallel enum.
      enum:
        - active
        - archived
    ProjectMetadata:
      type: object
      additionalProperties: false
      required:
        - displayName
        - metadataClass
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 160
          description: Projected display metadata only; it is not aggregate identity.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        metadataClass:
          $ref: "#/components/schemas/SensitiveMetadataTier"
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - projectMetadata
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        projectMetadata:
          $ref: "#/components/schemas/ProjectMetadata"
    UpdateProjectSetupRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - projectSetup
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        projectSetup:
          $ref: "#/components/schemas/ProjectSetup"
    ArchiveProjectRequest:
      type: object
      additionalProperties: false
      required:
        - requestSchemaVersion
        - archiveIntent
      properties:
        archiveIntent:
          type: string
          enum:
            - archive
          description: Command intent literal included in canonical idempotency equivalence.
        requestSchemaVersion:
          type: string
          enum:
            - v1
    LinkProjectConversationRequest:
      type: object
      additionalProperties: false
      description: Closed command body for link. Actor Party attribution is server-derived from authenticated tenant/principal context and is not accepted in this schema.
      required:
        - requestSchemaVersion
        - operation
        - projectId
        - conversationId
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        operation:
          type: string
          enum:
            - link
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        conversationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        expectedCurrentProjectId:
          nullable: true
          $ref: "#/components/schemas/OpaqueIdentifier"
    MoveProjectConversationRequest:
      type: object
      additionalProperties: false
      description: Closed command body for explicit source-to-target reassignment. Projects authorizes both source and target scopes before dispatch.
      required:
        - requestSchemaVersion
        - operation
        - projectId
        - conversationId
        - sourceProjectId
        - confirmed
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        operation:
          type: string
          enum:
            - move
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        conversationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        sourceProjectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        confirmed:
          type: boolean
          description: Must be true so clients cannot accidentally move a Conversation between Projects.
    UnlinkProjectConversationRequest:
      type: object
      additionalProperties: false
      description: Closed command body for clearing a Conversation's current Project assignment. It does not delete the Conversation.
      required:
        - requestSchemaVersion
        - operation
        - unlinkIntent
        - projectId
        - conversationId
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        operation:
          type: string
          enum:
            - unlink
        unlinkIntent:
          type: string
          enum:
            - clear
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        conversationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
    ProjectFolderMetadata:
      type: object
      additionalProperties: false
      description: Safe metadata-only Project Folder reference display metadata. It is not a path, tenant authority, repository detail, or folder content.
      required:
        - displayName
      properties:
        displayName:
          type: string
          nullable: true
          minLength: 1
          maxLength: 160
          description: Safe display metadata for the folder reference.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
    SetProjectFolderRequest:
      type: object
      additionalProperties: false
      description: Closed command body for setting or explicitly replacing the single Project Folder reference.
      required:
        - requestSchemaVersion
        - operation
        - projectId
        - folderId
        - folderMetadata
        - replacementConfirmed
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        operation:
          type: string
          enum:
            - set
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        folderId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        folderMetadata:
          $ref: "#/components/schemas/ProjectFolderMetadata"
        replacementConfirmed:
          type: boolean
          description: Must be true when replacing a different existing Project Folder reference.
    ProjectFileReferenceMetadata:
      type: object
      additionalProperties: false
      description: Safe metadata-only optional File Reference display metadata. It is not a path, tenant authority, repository detail, byte range, provider payload, or file content.
      required:
        - displayName
      properties:
        displayName:
          type: string
          nullable: true
          minLength: 1
          maxLength: 160
          description: Safe display metadata for the file reference.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
    WorkspaceRelativePath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "^(?!/)(?!.*(?:^|/)\\.\\.(?:$|/))(?!.*//)[A-Za-z0-9._/-]+$"
      description: Workspace-root-relative path used only to address Folders file metadata for the ACL check. It is never stored by Projects and is never a local, absolute, or unrestricted filesystem path. The pattern rejects a leading slash, parent-directory segments, and empty segments.
    LinkFileReferenceRequest:
      type: object
      additionalProperties: false
      description: Closed command body for linking an optional File Reference. Tenant/principal/actor authority is server-derived and not accepted here. The folder/workspace/path tuple is the minimum safe identifier set the Folders metadata-only ACL needs and is never persisted by Projects.
      required:
        - requestSchemaVersion
        - operation
        - projectId
        - fileReferenceId
        - folderId
        - workspaceId
        - filePath
        - fileMetadata
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        operation:
          type: string
          enum:
            - link
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        fileReferenceId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        folderId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        workspaceId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        filePath:
          $ref: "#/components/schemas/WorkspaceRelativePath"
        fileMetadata:
          $ref: "#/components/schemas/ProjectFileReferenceMetadata"
    UnlinkFileReferenceRequest:
      type: object
      additionalProperties: false
      description: Closed command body for unlinking an optional File Reference. It removes only the Project-to-file association and never deletes, reads, or mutates the underlying file.
      required:
        - requestSchemaVersion
        - operation
        - unlinkIntent
        - projectId
        - fileReferenceId
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        operation:
          type: string
          enum:
            - unlink
        unlinkIntent:
          type: string
          enum:
            - removeReference
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        fileReferenceId:
          $ref: "#/components/schemas/OpaqueIdentifier"
    ProjectMemoryReferenceMetadata:
      type: object
      additionalProperties: false
      description: Safe metadata-only Memory Reference display metadata. It is not Memories tenant authority, MemoryUnit content, content hash, source URI, embedding material, or raw upstream error text.
      required:
        - displayName
      properties:
        displayName:
          type: string
          nullable: true
          minLength: 1
          maxLength: 160
          description: Safe display metadata for the memory reference.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
    LinkMemoryRequest:
      type: object
      additionalProperties: false
      description: Closed command body for linking a Memory Reference (Hexalith.Memories Case). Tenant/principal/actor authority is server-derived and not accepted here. The Memories tenant is implicit (envelope tenant) and never accepted from the request body.
      required:
        - requestSchemaVersion
        - operation
        - projectId
        - memoryReferenceId
        - memoryMetadata
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        operation:
          type: string
          enum:
            - link
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        memoryReferenceId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        memoryMetadata:
          $ref: "#/components/schemas/ProjectMemoryReferenceMetadata"
    UnlinkMemoryRequest:
      type: object
      additionalProperties: false
      description: Closed command body for unlinking a Memory Reference. It removes only the Project-to-memory association and never calls Hexalith.Memories or mutates the underlying Case or any MemoryUnit.
      required:
        - requestSchemaVersion
        - operation
        - unlinkIntent
        - projectId
        - memoryReferenceId
      properties:
        requestSchemaVersion:
          type: string
          enum:
            - v1
        operation:
          type: string
          enum:
            - unlink
        unlinkIntent:
          type: string
          enum:
            - removeReference
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        memoryReferenceId:
          $ref: "#/components/schemas/OpaqueIdentifier"
    ProjectConversationsPage:
      type: object
      additionalProperties: false
      description: Metadata-only page of Conversations references assigned to a Project. It carries no transcript, message body, local Project membership copy, token, secret, or prompt.
      required:
        - projectId
        - items
        - page
        - trustSignal
      properties:
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/ProjectConversationItem"
        page:
          $ref: "#/components/schemas/ProjectConversationPageMetadata"
        trustSignal:
          $ref: "#/components/schemas/ProjectConversationTrustSignal"
    ProjectConversationItem:
      type: object
      additionalProperties: false
      description: Metadata-only Conversation reference shaped by Projects after Conversations-owned assignment and authorization checks.
      required:
        - projectId
        - conversationId
        - lifecycleStatus
        - trustSignal
      properties:
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        conversationId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        lifecycleStatus:
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[A-Za-z][A-Za-z0-9_-]{0,79}$"
        displayLabel:
          type: string
          nullable: true
          minLength: 1
          maxLength: 160
          description: Optional safe display label from Conversations metadata only.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        trustSignal:
          $ref: "#/components/schemas/ProjectConversationTrustSignal"
        projectSafeLabel:
          type: string
          nullable: true
          minLength: 1
          maxLength: 160
          description: Optional safe project hydration label supplied by Conversations.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        projectSafeStatus:
          type: string
          nullable: true
          minLength: 1
          maxLength: 80
          pattern: "^[A-Za-z][A-Za-z0-9_-]{0,79}$"
    ProjectConversationPageMetadata:
      type: object
      additionalProperties: false
      required:
        - returnedCount
      properties:
        returnedCount:
          type: integer
          format: int32
          minimum: 0
        continuationCursor:
          type: string
          nullable: true
          minLength: 1
          maxLength: 512
    ProjectConversationTrustSignal:
      type: string
      enum:
        - Current
        - Stale
        - Rebuilding
        - Unavailable
        - Forbidden
        - Redacted
        - MixedGeneration
    ProjectSetup:
      type: object
      additionalProperties: false
      description: Bounded metadata-only Project setup preferences. Carries no transcript, file contents, memory body, raw prompt, secret, token, command body, unrestricted path, or local path.
      required:
        - goals
        - userInstructions
        - preferredSourceKinds
        - excludedSourceKinds
      properties:
        goals:
          type: array
          maxItems: 16
          items:
            type: string
            minLength: 1
            maxLength: 512
            x-hexalith-sensitive-metadata-tier: tenant_sensitive
        userInstructions:
          type: array
          maxItems: 16
          items:
            type: string
            minLength: 1
            maxLength: 512
            x-hexalith-sensitive-metadata-tier: tenant_sensitive
        preferredSourceKinds:
          type: array
          maxItems: 4
          items:
            $ref: "#/components/schemas/ProjectContextSourceKind"
        excludedSourceKinds:
          type: array
          maxItems: 4
          items:
            $ref: "#/components/schemas/ProjectContextSourceKind"
        conversationStartDefaults:
          nullable: true
          $ref: "#/components/schemas/ConversationStartDefaults"
    ConversationStartDefaults:
      type: object
      additionalProperties: false
      required:
        - linkedSourcePolicy
      properties:
        linkedSourcePolicy:
          $ref: "#/components/schemas/LinkedSourcePolicy"
    ProjectContextSourceKind:
      type: string
      enum:
        - conversation
        - projectFolder
        - fileReference
        - memory
    LinkedSourcePolicy:
      type: string
      enum:
        - none
        - projectsOwnedMetadataOnly
        - authorizedReferences
    ProjectLifecycleStatus:
      type: object
      additionalProperties: false
      required:
        - projectId
        - lifecycleState
        - freshness
      properties:
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        lifecycleState:
          $ref: "#/components/schemas/ProjectLifecycleState"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    Project:
      type: object
      additionalProperties: false
      description: Metadata-only Open Project response returned by GetProject. Carries no transcript/file/memory body, raw prompt, secret, token, command body, sibling denial detail, or path.
      required:
        - projectId
        - name
        - lifecycleState
        - createdAt
        - updatedAt
        - setupMetadata
        - contextActivation
        - references
        - freshness
      properties:
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        name:
          type: string
          minLength: 1
          maxLength: 160
          description: Projected project name metadata only; it is not aggregate identity.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        description:
          type: string
          maxLength: 512
          description: Optional projected, metadata-only description.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        lifecycleState:
          $ref: "#/components/schemas/ProjectLifecycleState"
        createdAt:
          $ref: "#/components/schemas/UtcDateTime"
        updatedAt:
          $ref: "#/components/schemas/UtcDateTime"
        setupMetadata:
          type: string
          nullable: true
          maxLength: 512
          description: Optional safe setup metadata reference projected from Projects-owned data only; not a raw setup body, path, secret, token, or prompt.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        projectSetup:
          nullable: true
          description: Optional bounded metadata-only Project setup preferences projected from Projects-owned events.
          $ref: "#/components/schemas/ProjectSetup"
        contextActivation:
          $ref: "#/components/schemas/ContextActivation"
        references:
          type: array
          maxItems: 64
          description: Safe Projects-owned reference summaries. Empty is correct until Epic 2 reference events and ACLs can populate it.
          items:
            $ref: "#/components/schemas/ProjectReferenceSummary"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    ProjectListResponse:
      type: object
      additionalProperties: false
      description: Tenant-scoped, authorization-filtered list of metadata-only Project choices.
      required:
        - items
        - freshness
      properties:
        items:
          type: array
          maxItems: 200
          items:
            $ref: "#/components/schemas/ProjectListItem"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    ProjectListItem:
      type: object
      additionalProperties: false
      description: Metadata-only row for presenting a Project choice. Does not carry tenantId or full Project Context.
      required:
        - projectId
        - name
        - lifecycleState
        - createdAt
        - updatedAt
        - freshness
      properties:
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        name:
          type: string
          minLength: 1
          maxLength: 160
          description: Projected project name metadata only; it is not aggregate identity.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        lifecycleState:
          $ref: "#/components/schemas/ProjectLifecycleState"
        createdAt:
          $ref: "#/components/schemas/UtcDateTime"
        updatedAt:
          $ref: "#/components/schemas/UtcDateTime"
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    ContextActivation:
      type: object
      additionalProperties: false
      description: Explicitly states whether the opened Project may become active conversation context by default.
      required:
        - enabled
        - blockedReasonCode
      properties:
        enabled:
          type: boolean
        blockedReasonCode:
          type: string
          nullable: true
          maxLength: 80
          pattern: "^[a-z][a-z0-9_]{0,79}$"
          description: Metadata-only reason code when activation is blocked; null when enabled.
    ProjectReferenceSummary:
      type: object
      additionalProperties: false
      description: Safe Projects-owned reference summary. Folder references carry only metadata-only reference state and never folder contents or upstream raw authorization details.
      required:
        - referenceKind
        - referenceState
        - freshness
      properties:
        referenceKind:
          type: string
          enum:
            - conversation
            - folder
            - file
            - memory
        referenceState:
          type: string
          enum:
            - pending
            - included
            - excluded
            - unauthorized
            - unavailable
            - stale
            - archived
            - ambiguous
            - tenantMismatch
            - conflict
            - invalidReference
        referenceId:
          nullable: true
          $ref: "#/components/schemas/OpaqueIdentifier"
        displayName:
          type: string
          nullable: true
          minLength: 1
          maxLength: 160
          description: Safe display metadata for the referenced resource.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        reasonCode:
          type: string
          nullable: true
          maxLength: 80
          pattern: "^[a-z][a-z0-9_]{0,79}$"
          description: Stable metadata-only reason code for pending or unavailable states.
        freshness:
          $ref: "#/components/schemas/FreshnessMetadata"
    CanonicalErrorCategory:
      type: string
      description: Canonical error category vocabulary surfaced in ProblemDetails. Aligns with the shared Hexalith.Projects vocabulary semantics; never a parallel error enum.
      enum:
        - success
        - authentication_failure
        - tenant_access_denied
        - cross_tenant_access_denied
        - validation_error
        - idempotency_conflict
        - not_found
        - read_model_unavailable
        - projection_stale
        - projection_unavailable
        - redacted
        - internal_error
    ProjectContext:
      type: object
      additionalProperties: false
      description: >
        Assembled, authorization-filtered, metadata-only Project Context emitted by
        ProjectContextInclusionPolicy (AR-9, Story 3.1). Returned by GetProjectContext (Story 3.2).
        Carries opaque ids, safe display labels, shared-vocabulary states, timestamps, and
        closed-vocabulary diagnostic strings only. Never carries transcripts, file content,
        memory bodies, prompts, paths, tokens, secrets, or upstream raw denial detail. Per
        FS-8/SM-3, tenant authority is server-derived from the caller's claims and is
        intentionally NOT carried on the wire (the C# DTO suppresses TenantId via JsonIgnore).
      required:
        - projectId
        - lifecycle
        - conversations
        - fileReferences
        - memoryReferences
        - excluded
        - assemblyOutcome
        - observedAt
        - freshness
      properties:
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        lifecycle:
          description: Project lifecycle (PascalCase wire-name from the C# ProjectLifecycle enum).
          type: string
          enum:
            - Active
            - Archived
        setup:
          nullable: true
          description: Optional bounded metadata-only Project setup preferences (reused from the wider Project schema).
          $ref: "#/components/schemas/ProjectSetup"
        projectFolder:
          nullable: true
          description: Optional included single Project Folder reference.
          $ref: "#/components/schemas/ProjectContextReference"
        conversations:
          type: array
          maxItems: 100
          description: Included conversation references, ordered by (kind, id).
          items:
            $ref: "#/components/schemas/ProjectContextReference"
        fileReferences:
          type: array
          maxItems: 100
          description: Included file references, ordered by (kind, id).
          items:
            $ref: "#/components/schemas/ProjectContextReference"
        memoryReferences:
          type: array
          maxItems: 100
          description: Included memory references, ordered by (kind, id).
          items:
            $ref: "#/components/schemas/ProjectContextReference"
        excluded:
          type: array
          maxItems: 400
          description: Per-candidate exclusion rows for each candidate the policy left out, ordered by (kind, id).
          items:
            $ref: "#/components/schemas/ProjectContextExclusion"
        assemblyOutcome:
          $ref: "#/components/schemas/ProjectContextAssemblyOutcome"
        observedAt:
          $ref: "#/components/schemas/UtcDateTime"
        freshness:
          $ref: "#/components/schemas/ProjectContextFreshness"
    ProjectContextReference:
      type: object
      additionalProperties: false
      description: >
        Metadata-only assembled reference inside a ProjectContext. Carries opaque identifier, safe
        display label, shared-vocabulary ReferenceState, optional ReasonCode, and observation
        instant. Never carries transcripts, file content, memory bodies, prompts, paths, tokens, or
        secrets.
      required:
        - referenceKind
        - referenceId
        - referenceState
        - observedAt
      properties:
        referenceKind:
          type: string
          description: Allowlisted reference kind (folder, file, memory, conversation).
          enum:
            - folder
            - file
            - memory
            - conversation
        referenceId:
          type: string
          minLength: 1
          maxLength: 128
          description: Opaque sibling-owned reference identifier.
        displayName:
          type: string
          nullable: true
          minLength: 1
          maxLength: 160
          description: Safe display metadata for the referenced resource.
          x-hexalith-sensitive-metadata-tier: tenant_sensitive
        referenceState:
          description: Shared-vocabulary ReferenceState (PascalCase wire-name from the C# enum).
          type: string
          enum:
            - Pending
            - Included
            - Excluded
            - Unauthorized
            - Unavailable
            - Stale
            - Archived
            - Ambiguous
            - TenantMismatch
            - Conflict
            - InvalidReference
        reasonCode:
          nullable: true
          description: Optional shared-vocabulary ProjectReasonCode (PascalCase wire-name) explaining inclusion.
          type: string
          enum:
            - ConversationLinked
            - ProjectFolderMatched
            - FileReferenceMatched
            - MemoryMatched
            - MetadataMatched
        observedAt:
          $ref: "#/components/schemas/UtcDateTime"
    ProjectContextExclusion:
      type: object
      additionalProperties: false
      description: >
        Per-candidate exclusion row emitted by ProjectContextInclusionPolicy. Identifies the single
        failed inclusion check and a closed-vocabulary diagnostic string from
        ProjectContextInclusionDiagnostic. The diagnostic value is a member of the closed vocabulary
        — free-form upstream message/path/token/payload text never appears here.
      required:
        - referenceKind
        - referenceId
        - referenceState
        - failedCheck
      properties:
        referenceKind:
          type: string
          description: Allowlisted reference kind, or the candidate kind for non-allowlisted cases.
          minLength: 1
          maxLength: 32
        referenceId:
          type: string
          minLength: 1
          maxLength: 128
          description: Opaque sibling-owned reference identifier.
        referenceState:
          description: Shared-vocabulary ReferenceState surfaced for the excluded reference.
          type: string
          enum:
            - Pending
            - Included
            - Excluded
            - Unauthorized
            - Unavailable
            - Stale
            - Archived
            - Ambiguous
            - TenantMismatch
            - Conflict
            - InvalidReference
        reasonCode:
          nullable: true
          description: Optional shared-vocabulary ProjectReasonCode (typically null for exclusions).
          type: string
          enum:
            - ConversationLinked
            - ProjectFolderMatched
            - FileReferenceMatched
            - MemoryMatched
            - MetadataMatched
        failedCheck:
          $ref: "#/components/schemas/ProjectContextInclusionCheck"
        diagnostic:
          nullable: true
          description: Closed-vocabulary ProjectContextInclusionDiagnostic value. The 13 known values are tenantMismatch, projectUnknown, projectArchived, referenceUnauthorized, referenceUnavailable, referenceStale, referenceArchived, referenceConflict, referenceInvalidIdentifier, referenceKindNotAllowlisted, projectFolderPending, referenceAmbiguous, referenceRedacted.
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z][A-Za-z0-9]{0,79}$"
    ProjectContextAssemblyOutcome:
      type: string
      description: Outer assembly outcome from ProjectContextInclusionPolicy (Story 3.1).
      enum:
        - Assembled
        - ProjectUnavailable
        - Unauthorized
    ProjectContextFreshness:
      type: string
      description: Assembly-level freshness signal derived from the tenant-access projection.
      enum:
        - Fresh
        - Stale
        - Unavailable
        - Unknown
    ProjectContextInclusionCheck:
      type: string
      description: Inclusion-policy check identity — names the single failed check whose verdict excluded a candidate or collapsed the assembly. Mirrors ProjectContextInclusionOrder.Sequence.
      enum:
        - TenantAuthority
        - ProjectVisibility
        - ProjectLifecycle
        - ReferenceAuthorization
        - ReferenceLifecycle
        - ReferenceFreshness
        - ReferenceKindAllowlist
    ProjectContextExplanation:
      type: object
      additionalProperties: false
      description: >
        Wire-body wrapper returned by GetProjectContextExplanation (Story 3.3, FR-17, UJ-4, AR-9):
        carries the assembled metadata-only ProjectContext plus the per-candidate evaluation trace
        emitted by ProjectContextInclusionPolicy (Story 3.1). Operators read the per-candidate
        verdict (Included / Excluded with named failed check + closed-vocabulary diagnostic) without
        re-running the assembly. Tenant authority is server-derived and intentionally NOT carried on
        the wire (FS-8 / SM-3): the wrapped ProjectContext suppresses TenantId via JsonIgnore and
        evaluation rows carry only closed-vocabulary diagnostic strings.
      required:
        - context
        - evaluations
      properties:
        context:
          $ref: "#/components/schemas/ProjectContext"
        evaluations:
          type: array
          maxItems: 400
          description: Per-candidate evaluation rows, ordered by (referenceKind, referenceId) Ordinal. One row per active candidate kind.
          items:
            $ref: "#/components/schemas/ProjectContextEvaluation"
    ProjectContextEvaluation:
      type: object
      additionalProperties: false
      description: >
        Per-candidate evaluation row emitted by ProjectContextInclusionPolicy alongside the assembled
        ProjectContext. Identifies the candidate, the surfaced ReferenceState, the single failed
        inclusion check (or null when included), the optional shared-vocabulary ReasonCode (set on
        inclusion), the optional closed-vocabulary diagnostic, and the observation instant. Never
        carries free-form upstream message / path / token / payload text.
      required:
        - referenceKind
        - referenceId
        - resultState
        - observedAt
      properties:
        referenceKind:
          type: string
          description: Allowlisted reference kind (folder, file, memory, conversation).
          enum:
            - folder
            - file
            - memory
            - conversation
        referenceId:
          type: string
          minLength: 1
          maxLength: 128
          description: Opaque sibling-owned reference identifier.
        resultState:
          description: Shared-vocabulary ReferenceState (PascalCase wire-name from the C# enum) surfaced for the candidate.
          type: string
          enum:
            - Pending
            - Included
            - Excluded
            - Unauthorized
            - Unavailable
            - Stale
            - Archived
            - Ambiguous
            - TenantMismatch
            - Conflict
            - InvalidReference
        failedCheck:
          nullable: true
          description: The single failed inclusion check, or null when the candidate was included.
          $ref: "#/components/schemas/ProjectContextInclusionCheck"
        reasonCode:
          nullable: true
          description: Optional shared-vocabulary ProjectReasonCode (typically set on inclusion).
          type: string
          enum:
            - ConversationLinked
            - ProjectFolderMatched
            - FileReferenceMatched
            - MemoryMatched
            - MetadataMatched
        diagnostic:
          nullable: true
          description: Closed-vocabulary ProjectContextInclusionDiagnostic value. The 13 known values are tenantMismatch, projectUnknown, projectArchived, referenceUnauthorized, referenceUnavailable, referenceStale, referenceArchived, referenceConflict, referenceInvalidIdentifier, referenceKindNotAllowlisted, projectFolderPending, referenceAmbiguous, referenceRedacted.
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z][A-Za-z0-9]{0,79}$"
        observedAt:
          $ref: "#/components/schemas/UtcDateTime"
    ConversationStartSetup:
      type: object
      additionalProperties: false
      description: >
        Bounded conversation-start subset of Project Setup returned by GetConversationStartSetup
        (Story 3.5, FR-20). Carries goals, instructions, source-kind preferences, the default
        linked-source policy, plus the lifecycle / observed-at / freshness envelope. Excludes
        internal audit metadata (no createdAt / updatedAt / sequence / setupMetadata) and
        per-reference inventory (no projectFolder / fileReferences / memoryReferences /
        conversations / excluded / assemblyOutcome). Tenant authority is server-derived and
        intentionally NOT carried on the wire (FS-8 / SM-3) — the C# DTO does not declare TenantId
        at all (cleaner than the [JsonIgnore]-on-required-field pattern Story 3.2 used for
        ProjectContext.TenantId).
      required:
        - projectId
        - lifecycle
        - goals
        - userInstructions
        - preferredSourceKinds
        - excludedSourceKinds
        - linkedSourcePolicy
        - observedAt
        - freshness
      properties:
        projectId:
          $ref: "#/components/schemas/OpaqueIdentifier"
        lifecycle:
          description: Project lifecycle (PascalCase wire-name from the C# ProjectLifecycle enum).
          type: string
          enum:
            - Active
            - Archived
        goals:
          type: array
          maxItems: 16
          description: Bounded safe project goals (empty when setup is absent).
          items:
            type: string
            minLength: 1
            maxLength: 512
            x-hexalith-sensitive-metadata-tier: tenant_sensitive
        userInstructions:
          type: array
          maxItems: 16
          description: Bounded user-facing instructions (empty when setup is absent).
          items:
            type: string
            minLength: 1
            maxLength: 512
            x-hexalith-sensitive-metadata-tier: tenant_sensitive
        preferredSourceKinds:
          type: array
          maxItems: 4
          description: Preferred source kinds for future context selection (empty when setup is absent).
          items:
            $ref: "#/components/schemas/ProjectContextSourceKind"
        excludedSourceKinds:
          type: array
          maxItems: 4
          description: Excluded source kinds for future context selection (empty when setup is absent).
          items:
            $ref: "#/components/schemas/ProjectContextSourceKind"
        linkedSourcePolicy:
          $ref: "#/components/schemas/LinkedSourcePolicy"
        observedAt:
          $ref: "#/components/schemas/UtcDateTime"
        freshness:
          $ref: "#/components/schemas/ProjectContextFreshness"
