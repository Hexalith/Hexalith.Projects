openapi: 3.1.0
info:
  title: Hexalith.Projects API
  version: v1
  summary: Contract Spine foundation for tenant-scoped project workspace and context-resolution workflows.
  description: >-
    Canonical OpenAPI 3.1 foundation for Hexalith.Projects. This document defines
    shared contract language only (the cross-cutting envelope: headers, RFC 9457
    Problem Details, command-async 202, safe-denial, freshness/trust). Concrete
    operation groups are added by later stories.

    Tenant authority comes from authenticated principal claims and EventStore envelopes, never from request payloads, query parameters, or client-controlled headers.
servers:
  - url: /api/v1
    description: URL-versioned REST surface. Deployment hosts and real issuer or audience values are supplied by environment configuration.
tags:
  - name: projects
    description: Tenant-scoped project lifecycle contracts.
  - name: query-status
    description: Accepted command and projection status contracts.
security:
  - oidcBearer: []
paths:
  # Mutations keep Idempotency-Key; queries do not accept it and reject it after authorization.
  # Conversation reference membership is owned by Hexalith.Conversations and orchestrated through
  # Projects write-side ACLs; no Project aggregate conversation list is modeled here.
  /api/v1/projects:
    get:
      tags:
        - projects
      operationId: ListProjects
      summary: List authorized tenant-scoped project choices.
      description: >
        Lists metadata-only Projects visible to the authenticated tenant/principal context. The
        optional lifecycle filter accepts active, archived, or all; absent is equivalent to all.
        Tenant authority comes from authenticated principal claims and EventStore envelopes, never
        from client-controlled tenant fields. Idempotency-Key is not a query parameter and is rejected
        if present after authorization.
      parameters:
        - $ref: "#/components/parameters/LifecycleFilter"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
      responses:
        "200":
          description: Authorized metadata-only project choices with freshness evidence.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            X-Hexalith-Freshness:
              $ref: "#/components/headers/Freshness"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
              examples:
                synthetic:
                  $ref: "#/components/examples/ProjectListResponse"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-read-consistency:
        class: eventually_consistent
        freshnessBehavior: returns-projection-watermark-when-available
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: query-correlation-only
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-project-list-permission
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - cross_tenant_access_denied
        - validation_error
        - not_found
        - read_model_unavailable
        - projection_stale
        - projection_unavailable
        - internal_error
    post:
      tags:
        - projects
      operationId: CreateProject
      summary: Create a tenant-scoped project (command-async).
      description: >
        Creates a tenant-scoped Project workspace record durably as Active. Returns 202
        Accepted with no read-after-write guarantee — confirm via the GetProject query.
        The only required user input is the project name; default lifecycle is active. When no
        Project Folder is supplied, Projects records a metadata-only pending folder-create intent
        until the Folders create route is available and lifecycle/freshness evidence can confirm the
        created folder. Tenant authority comes from authenticated principal claims and EventStore
        envelopes, never from this request.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/CreateProjectRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - project_metadata.display_name
        - request_schema_version
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: eventstore-envelope-causation-reference
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-project-create-permission
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - validation_error
        - idempotency_conflict
        - internal_error
  /api/v1/projects/{projectId}:
    get:
      tags:
        - projects
      operationId: GetProject
      summary: Open a project as metadata-only read context.
      description: >
        Returns authorized Project metadata, lifecycle state, safe setup metadata, empty-safe
        reference summaries, context-activation availability, and projection freshness/trust evidence.
        The response is metadata-only: it carries no conversation transcript, file contents, memory
        payload, raw prompt, secret, token, full command body, unrestricted path, or raw sibling denial
        detail. Reads are eventually consistent and carry the X-Hexalith-Freshness response header.
        Idempotency-Key is not a query parameter and is rejected if present after authorization.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
      responses:
        "200":
          description: Metadata-only Open Project body with freshness evidence.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            X-Hexalith-Freshness:
              $ref: "#/components/headers/Freshness"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
              examples:
                synthetic:
                  $ref: "#/components/examples/Project"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-read-consistency:
        class: eventually_consistent
        freshnessBehavior: returns-projection-watermark-when-available
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: query-correlation-only
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-and-project-read-permission
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - cross_tenant_access_denied
        - not_found
        - read_model_unavailable
        - projection_stale
        - projection_unavailable
        - internal_error
  /api/v1/projects/{projectId}/conversations:
    get:
      tags:
        - projects
      operationId: ListProjectConversations
      summary: List metadata-only conversation references currently assigned to a Project.
      description: >
        Lists authorized, metadata-only Conversations associated with the Project by querying
        Hexalith.Conversations through the Projects ACL. Reads are eventually consistent, carry
        freshness/trust evidence, and reject Idempotency-Key after authorization.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/Freshness"
      responses:
        "200":
          description: Metadata-only conversation references with Projects-owned trust signals.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            X-Hexalith-Freshness:
              $ref: "#/components/headers/Freshness"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectConversationsPage"
              examples:
                synthetic:
                  $ref: "#/components/examples/ProjectConversationsPage"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-read-consistency:
        class: eventually_consistent
        freshnessBehavior: conversations-projection-trust-signal
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: query-correlation-only
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-project-read-permission-and-project-detail
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - cross_tenant_access_denied
        - validation_error
        - not_found
        - read_model_unavailable
        - projection_stale
        - projection_unavailable
        - internal_error
  /api/v1/projects/{projectId}/conversations/{conversationId}/link:
    post:
      tags:
        - projects
      operationId: LinkProjectConversation
      summary: Link an existing conversation to a Project (command-async).
      description: >
        Links an existing Conversation to the target Project only when the Conversation is unassigned
        or already assigned to the same Project. If the Conversation is assigned elsewhere, callers
        must use the explicit move operation. Actor Party attribution is server-derived from the
        authenticated tenant and principal; request bodies cannot provide tenant, principal, or actor
        authority.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ConversationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkProjectConversationRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/LinkProjectConversationRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - conversation_id
        - expected_current_project_id
        - operation
        - project_id
        - request_schema_version
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: task-id
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-project-link-conversation-permission-and-project-detail
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - validation_error
        - idempotency_conflict
        - not_found
        - read_model_unavailable
        - internal_error
  /api/v1/projects/{projectId}/conversations/{conversationId}/move:
    post:
      tags:
        - projects
      operationId: MoveProjectConversation
      summary: Move a conversation from one Project to another with explicit confirmation.
      description: >
        Moves a Conversation from an expected source Project to the target Project. Projects
        authorizes both source and target Project scopes before calling Conversations with the
        expected-current guard so stale clients cannot overwrite a newer assignment.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ConversationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveProjectConversationRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/MoveProjectConversationRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - confirmed
        - conversation_id
        - operation
        - project_id
        - request_schema_version
        - source_project_id
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: task-id
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-project-move-conversation-permission-and-source-target-project-details
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - validation_error
        - idempotency_conflict
        - not_found
        - read_model_unavailable
        - internal_error
  /api/v1/projects/{projectId}/conversations/{conversationId}:
    delete:
      tags:
        - projects
      operationId: UnlinkProjectConversation
      summary: Unlink a conversation from the Project without deleting the Conversation.
      description: >
        Clears the Conversation's current Project assignment only when it still points at the route
        Project. The underlying Conversation is not deleted, and Projects does not maintain a local
        mutable membership list.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ConversationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlinkProjectConversationRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/UnlinkProjectConversationRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - conversation_id
        - operation
        - project_id
        - request_schema_version
        - unlink_intent
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: task-id
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-project-unlink-conversation-permission-and-project-detail
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - validation_error
        - idempotency_conflict
        - not_found
        - read_model_unavailable
        - internal_error
  /api/v1/projects/{projectId}/folder:
    put:
      tags:
        - projects
      operationId: SetProjectFolder
      summary: Set or explicitly replace a Project Folder reference.
      description: >
        Sets the single authorized Project Folder reference for an active Project. Hexalith.Folders
        remains the lifecycle and authorization owner; Projects stores only the metadata-only folder
        reference and safe display metadata. Replacing a different existing Project Folder requires
        explicit replacement confirmation.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetProjectFolderRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/SetProjectFolderRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - folder_id
        - folder_metadata.display_name
        - operation
        - project_id
        - replacement_confirmed
        - request_schema_version
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: task-id
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-project-set-folder-permission-project-detail-and-folders-acl
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - validation_error
        - idempotency_conflict
        - not_found
        - read_model_unavailable
        - internal_error
  /api/v1/projects/{projectId}/files/{fileReferenceId}/link:
    post:
      tags:
        - projects
      operationId: LinkFileReference
      summary: Link an authorized optional File Reference to an active Project.
      description: >
        Links a single authorized optional File Reference to an active Project (FR-9, FR-11).
        Hexalith.Folders remains the file lifecycle, content, path-policy, and authorization owner;
        Projects stores only the opaque reference identifier, the owning folder identifier, and safe
        display metadata. The server validates the file through the Folders metadata-only ACL before
        accepting and never reads file contents. Linking a file never clears, replaces, satisfies, or
        auto-creates the single Project Folder. Tenant authority comes from authenticated principal
        claims and EventStore envelopes, never the request body.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FileReferenceId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkFileReferenceRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/LinkFileReferenceRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
          $ref: "#/components/responses/SafeAuthorizationDenial403"
        "404":
          $ref: "#/components/responses/SafeAuthorizationDenial404"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "503":
          $ref: "#/components/responses/ReadModelUnavailable"
      x-hexalith-idempotency-key:
        required: true
        adapterSourcing:
          - rest-header
          - sdk-caller-or-provider
          - cli-flag-or-allow-auto-key
          - mcp-input
        missingBehavior: validation_error
        malformedBehavior: validation_error
        queryBehavior: rejected-if-present
      x-hexalith-idempotency-equivalence:
        - file_metadata.display_name
        - file_reference_id
        - folder_id
        - operation
        - project_id
        - request_schema_version
      x-hexalith-idempotency-ttl-tier: mutation
      x-hexalith-correlation:
        correlationHeader: X-Correlation-Id
        taskHeader: X-Hexalith-Task-Id
        causation: task-id
        adapterBehavior: caller-provided-or-generated-correlation
      x-hexalith-authorization:
        requirement: tenant-context-project-link-file-reference-permission-project-detail-and-folders-file-acl
        tenantAuthority: authentication-context-and-eventstore-envelope
        safeDenial: externally-indistinguishable
      x-hexalith-canonical-error-categories:
        - authentication_failure
        - tenant_access_denied
        - validation_error
        - idempotency_conflict
        - not_found
        - read_model_unavailable
        - internal_error
  /api/v1/projects/{projectId}/files/{fileReferenceId}:
    delete:
      tags:
        - projects
      operationId: UnlinkFileReference
      summary: Unlink an optional File Reference from a Project without deleting the file.
      description: >
        Removes only the Project-to-file association (FR-9, FR-11). It never deletes, removes, archives,
        reads, mutates, or otherwise changes the underlying file in Hexalith.Folders, and it never
        removes the single Project Folder reference. Unlinking a file reference that is not present is a
        safe idempotent no-op.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/FileReferenceId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlinkFileReferenceRequest"
            examples:
              synthetic:
                $ref: "#/components/examples/UnlinkFileReferenceRequest"
      responses:
        "202":
          $ref: "#/components/responses/AcceptedCommand"
        "400":
          $ref: "#/components/responses/ValidationFailure"
        "401":
          $ref: "#/components/responses/SafeAuthorizationDenial401"
        "403":
