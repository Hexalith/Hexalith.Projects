    - missing-required-key
    - unresolved-placeholder
    - incomplete-ownership
    - incomplete-pinned-revision
    - missing-verification-command
    - missing-evidence-artifact
    - failed-critical-evidence
    - unexplained-critical-skip
    - passed-on-unavailable-environment
