    fr: FR-1..FR-24
    nfr: NFR-1..NFR-11
    finding: "9 P1 + 7 P2 (E-7)"
    release: "12 NFR-11/AD-30 critical categories"

# ── Status vocabulary (honest, fail-closed) ──────────────────────────────────
status_legend:
  pending: "owned + fully specified; not yet executed. NOT a pass."
  blocked-external: "additionally gated on a G-1..G-6 external capability. NOT a pass."
  not-verified: "environment/tool unavailable. NEVER a pass."
  failed: "executed and currently failing."
  passed: "real, honest passing evidence (none yet)."

# ── Containment ──────────────────────────────────────────────────────────────
